<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and favicon -->
    <title>Dashboard << GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./images/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwindcss and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <header>
      <div class="navbar flex-col md:flex-row gap-4 bg-base-100 shadow-sm">
        <div class="flex-1 flex items-center">
          <img
            src="./images/github-logo.png"
            alt="GitHub Issues Tracker Logo"
            class="w-8 h-8"
          />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered"
          />
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>
    <main class="container mx-auto py-10">
      <!-- issue tabs -->
      <div class="bg-white p-4 rounded-md shadow-sm flex gap-4 mb-4">
        <button class="btn btn-primary">All</button>
        <button class="btn">Open</button>
        <button class="btn">Closed</button>
      </div>

      <section>
        <!-- issue list top -->
        <div
          class="bg-white p-4 rounded-t-lg shadow-sm flex flex-col md:flex-row gap-4 justify-between items-center"
        >
          <div class="issue-count flex items-center gap-3">
            <div
              class="w-10 h-10 flex justify-center items-center bg-gray-200 rounded-full"
            >
              <img
                src="./images/Aperture.png"
                alt="GitHub Issues Tracker"
                class="w-8 h-8"
              />
            </div>
            <div class="">
              <h3 class="text-xl font-bold"><span>50</span> Issues</h3>
              <p class="text-neutral/70">Track and manage your GitHub issues</p>
            </div>
          </div>
          <div class="issue-status-marker flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-600"></span>
            <span class="mr-4">Open</span>
            <span class="w-3 h-3 rounded-full bg-purple-600"></span>
            <span>Closed</span>
          </div>
        </div>

        <!-- issue list content -->
        <div
          id="issue-container"
          class="issue-list-container p-6 rounded-b-lg shadow-md grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3"
        ></div>
      </section>

      <!-- loading spinner -->
      <section id="spinner" class="py-10 text-center hidden">
        <span class="loading loading-bars text-primary loading-xl"></span>
      </section>

      <!-- issue details modal -->
      <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modal-container" class="space-y-6"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <!-- script -->
    <script src="./scripts/dashboard.js"></script>
  </body>
</html>
